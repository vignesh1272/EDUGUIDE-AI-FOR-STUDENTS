{% extends "base.html" %}
{% block content %}
<div class="glass-container">
    <div class="glass-header">
        <h1>🎓 College Recommendation</h1>
        <p>Provide your details to find the best college for you.</p>
    </div>

    <div class="glass-card form-card">
        <div class="card-header">
            <span class="card-icon">📋</span>
            <h2>Your Profile</h2>
        </div>
        <div class="card-content">
            <div class="input-group">
                <label>👤 Gender</label>
                <select id="gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="input-group">
                <label>📚 Stream (in 12th)</label>
                <select id="stream">
                    <option value="Science">Science</option>
                    <option value="Commerce">Commerce</option>
                    <option value="Arts">Arts</option>
                </select>
            </div>
            <div class="input-group">
                <label>📊 12th Percentage</label>
                <input type="number" id="percentage" step="0.01" placeholder="e.g., 85.5" min="0" max="100" required>
            </div>
            <div class="input-group">
                <label>📍 Location</label>
                <select id="location">
                    <option value="Urban">Urban</option>
                    <option value="Rural">Rural</option>
                </select>
            </div>
            <div class="input-group">
                <label>👪 Parent's Occupation</label>
                <select id="parent_occupation">
                    <option value="Government Job">Government Job</option>
                    <option value="Private Job">Private Job</option>
                    <option value="Business">Business</option>
                    <option value="Farmer">Farmer</option>
                </select>
            </div>
            <div class="input-group">
                <label>💼 Career Interest</label>
                <select id="career_interest">
                    <option value="Medicine">Medicine</option>
                    <option value="Engineering">Engineering</option>
                    <option value="IAS">IAS</option>
                    <option value="CA">CA</option>
                    <option value="Law">Law</option>
                    <option value="Business">Business</option>
                    <option value="Design">Design</option>
                    <option value="Teaching">Teaching</option>
                    <option value="Research">Research</option>
                    <option value="Farming">Farming</option>
                    <option value="Psychology">Psychology</option>
                    <option value="Fine Arts">Fine Arts</option>
                    <option value="Physics">Physics</option>
                    <option value="Maths">Maths</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Journalism">Journalism</option>
                </select>
            </div>
            <button class="glass-button" onclick="predictCollege()">🏛️ Get College Recommendations</button>
        </div>
    </div>

    <div class="glass-chat" id="chat-box">
        <div class="message bot animate-fade-in">
            <span class="message-icon">🤖</span> 
            Hi {{ session.username }}! Fill in your details above.
        </div>
    </div>
</div>

<script>
    function predictCollege() {
        const formData = new FormData();
        formData.append('gender', document.getElementById('gender').value);
        formData.append('stream', document.getElementById('stream').value);
        formData.append('percentage', document.getElementById('percentage').value);
        formData.append('location', document.getElementById('location').value);
        formData.append('parent_occupation', document.getElementById('parent_occupation').value);
        formData.append('career_interest', document.getElementById('career_interest').value);

        fetch('/predict_college', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(result => {
            if (!result.success) {
                addMessage('bot', '⚠️ ' + result.error);
                return;
            }
            addMessage('user', `👤 Gender: ${formData.get('gender')}, 📚 Stream: ${formData.get('stream')}, 📊 %: ${formData.get('percentage')}, 📍 Location: ${formData.get('location')}, 👪 Parent: ${formData.get('parent_occupation')}, 💼 Career: ${formData.get('career_interest')}`);
            addMessage('bot', `🎓 <strong>Preferred Degree:</strong> ${result.degree}`);
            addMessage('bot', '<div style="margin-top:10px"></div>'); // gap
            if (result.colleges.length === 0) {
                addMessage('bot', '❌ No colleges found for this degree.');
            } else {
                addMessage('bot', '🏛️ <strong>Recommended Colleges:</strong>');
                result.colleges.forEach(college => {
                    addMessage('bot', `📌 ${college.College} - ${college.City}`);
                });
            }
        });
    }

    function addMessage(sender, text) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender} animate-slide-in`;
        msgDiv.innerHTML = `<span class="message-icon">${sender === 'user' ? '👤' : '🤖'}</span> ${text}`;
        chatBox.appendChild(msgDiv);
        // Scroll to the top to show the earliest messages
        chatBox.scrollTop = 0;
    }
</script>
{% endblock %}
